<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Metis logo</title>
  <desc id="desc">A geometric Metis monogram inside a faceted local-rule engine mark: scattered traces narrowed into one reviewable rule line.</desc>
  <defs>
    <linearGradient id="bronzeEdge" x1="37" y1="27" x2="153" y2="163" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8BC84"/>
      <stop offset="1" stop-color="#9C7A4A"/>
    </linearGradient>
  </defs>
  <!-- engine shell: flat ink-black hexagon, single bronze rim, no glow -->
  <path d="M96 18L157.487 53.5V124.5L96 160L34.5128 124.5V53.5L96 18Z" fill="#0E1116"/>
  <path d="M96 18L157.487 53.5V124.5L96 160L34.5128 124.5V53.5L96 18Z" stroke="url(#bronzeEdge)" stroke-width="2.5"/>
  <!-- inner facet, faint -->
  <path d="M96 34L143.765 61.5V116.5L96 144L48.2346 116.5V61.5L96 34Z" stroke="#C7A76A" stroke-opacity="0.18" stroke-width="1.5"/>
  <!-- M monogram, single bronze stroke -->
  <path d="M62 119V65L81.8 94.4L96 70.8L110.2 94.4L130 65V119" stroke="#D2B375" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the rule line: scattered traces resolved into one reviewable rule -->
  <path d="M55 139H137" stroke="#C7A76A" stroke-width="5" stroke-linecap="round"/>
  <path d="M73 139H119" stroke="#6FB68A" stroke-width="2" stroke-linecap="round"/>
  <!-- scattered local traces, narrowing into the monogram -->
  <circle cx="61" cy="54" r="3.5" fill="#6FB68A"/>
  <circle cx="96" cy="44" r="3.5" fill="#E6EAF0"/>
  <circle cx="131" cy="54" r="3.5" fill="#C7A76A"/>
  <path d="M61 54L81.8 94.4M96 44V70.8M131 54L110.2 94.4" stroke="#C7A76A" stroke-opacity="0.22" stroke-width="1.5" stroke-linecap="round"/>
</svg>
