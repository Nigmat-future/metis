      <stop offset="1" stop-color="#16111F"/>
    </linearGradient>
    <linearGradient id="rim" x1="37" y1="27" x2="153" y2="163" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D6F7E7"/>
      <stop offset="0.38" stop-color="#56D39A"/>
      <stop offset="0.7" stop-color="#7B7CFF"/>
      <stop offset="1" stop-color="#F0E6FF"/>
    </linearGradient>
    <linearGradient id="mono" x1="52" y1="55" x2="144" y2="133" gradientUnits="userSpaceOnUse">
