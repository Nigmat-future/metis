<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Metis logo</title>
  <desc id="desc">A geometric Metis monogram inside a faceted local-rule engine mark.</desc>
  <defs>
    <linearGradient id="shell" x1="34" y1="24" x2="162" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171A23"/>
